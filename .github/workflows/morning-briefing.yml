name: Morning Briefing — 7:00 AM AST

on:
  schedule:
    # 7:00 AM AST = 11:00 AM UTC (AST is UTC-4, no DST) — Mondays only
    - cron: "0 11 * * 1"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  briefing:
    name: Run & Email Morning Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send morning briefing
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          CLICKUP_API_TOKEN:  ${{ secrets.CLICKUP_API_TOKEN }}
          MERCURY_API_TOKEN:  ${{ secrets.MERCURY_API_TOKEN }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:        ${{ secrets.RESEND_FROM }}
          REPORT_TO:          ${{ secrets.REPORT_TO }}
        run: python scripts/send_briefing.py
